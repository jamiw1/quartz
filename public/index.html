<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>quartz</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
  </head>
  <body>
    <style>
      :root,
      p {
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Oxygen,
          Ubuntu,
          Cantarell,
          "Open Sans",
          "Helvetica Neue",
          sans-serif;
        font-size: 11pt;
      }
      .parent-container {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100dvh;
      }
    </style>
    <div class="parent-container">
      <div style="display: flex; flex-direction: column; gap: 8pt">
        <div>
          <input id="file-input" type="file" />
          <button id="upload-btn">upload</button>
        </div>
        <div style="display: flex; flex-direction: column; gap: 4px; margin-top: 4px;">
          <input id="link-count" type="range" min="1" max="100" value="1" style="width: 150px;" />
          <span id="link-count-label" style="font-size: 10pt; color: #555;">Links: 1</span>
        </div>
        <progress id="progress-bar" value="0" max="100" style="display: none; margin-top: 8px; width: 100%;"></progress>
        <div id="links-container" style="display: flex; flex-direction: column; gap: 8pt; margin-top: 8pt;"></div>
        <canvas
          id="qr-code"
          width="100"
          height="100"
          style="width: 100px; height: 100px; display: none"
        ></canvas>
      </div>
    </div>
    <script>
      var fileInput = document.getElementById("file-input");
      var uploadBtn = document.getElementById("upload-btn");
      var qrcode = document.getElementById("qr-code");
      var linkCountInput = document.getElementById("link-count");
      var linkCountLabel = document.getElementById("link-count-label");

      linkCountInput.oninput = function () {
        linkCountLabel.textContent = "Links: " + this.value;
      };

      const qr = new QRious({
        element: qrcode,
        value: "",
        size: 100,
        background: "#ffffff",
        foreground: "#000000",
        level: "L",
      });

      uploadBtn.onclick = function () {
        var files = fileInput.files;
        if (files.length === 0) {
          alert("please select a file first.");
          return;
        }

        var file = files[0];
        var formData = new FormData();
        formData.append("document", file);
        formData.append("link_count", linkCountInput.value);

        uploadBtn.disabled = true;
        uploadBtn.textContent = "uploading...";

        var progressBar = document.getElementById("progress-bar");
        progressBar.style.display = "inline-block";
        progressBar.value = 0;

        var linksContainer = document.getElementById("links-container");
        linksContainer.innerHTML = "";
        qrcode.style.display = "none";

        var xhr = new XMLHttpRequest();
        xhr.open("POST", "/upload", true);

        xhr.upload.onprogress = function (e) {
          if (e.lengthComputable) {
            var percentComplete = Math.round((e.loaded / e.total) * 100);
            progressBar.value = percentComplete;
          }
        };

        xhr.onload = function () {
          progressBar.style.display = "none";
          if (xhr.status >= 200 && xhr.status < 300) {
            try {
              var data = JSON.parse(xhr.responseText);
              if (data.status === "success" && data.links) {
                data.links.forEach(function (linkId) {
                  var linkUrl = window.location.origin + "/download/" + linkId;

                  var linkDiv = document.createElement("div");
                  linkDiv.style.display = "flex";
                  linkDiv.style.alignItems = "center";
                  linkDiv.style.gap = "8px";

                  var a = document.createElement("a");
                  a.href = linkUrl;
                  a.textContent = linkUrl;
                  a.target = "_blank";

                  var copyBtn = document.createElement("button");
                  copyBtn.textContent = "copy";
                  copyBtn.onclick = function () {
                    navigator.clipboard.writeText(linkUrl).then(function () {
                      copyBtn.textContent = "copied!";
                      setTimeout(function () {
                        copyBtn.textContent = "copy";
                      }, 2000);
                    });
                  };

                  var qrBtn = document.createElement("button");
                  qrBtn.textContent = "show QR";
                  qrBtn.onclick = function () {
                    qr.value = linkUrl;
                    qrcode.style.display = "block";
                  };

                  linkDiv.appendChild(a);
                  linkDiv.appendChild(copyBtn);
                  linkDiv.appendChild(qrBtn);
                  linksContainer.appendChild(linkDiv);
                });

                uploadBtn.textContent = "uploaded!";
                setTimeout(() => {
                  uploadBtn.textContent = "upload";
                }, 2000);
              } else {
                throw new Error("invalid response format");
              }
            } catch (err) {
              console.error("upload error:", err);
              alert("upload failed: " + err.message);
              uploadBtn.textContent = "upload";
            }
          } else {
            console.error("upload failed with status:", xhr.status);
            alert("upload failed with status: " + xhr.status);
            uploadBtn.textContent = "upload";
          }
          uploadBtn.disabled = false;
        };

        xhr.onerror = function () {
          progressBar.style.display = "none";
          console.error("upload network error");
          alert("upload failed due to network error");
          uploadBtn.textContent = "upload";
          uploadBtn.disabled = false;
        };

        xhr.send(formData);
      };
    </script>
  </body>
</html>
